name: Deploy to Surge

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Stamp deploy version
        run: |
          # Unique per deploy: date + short commit SHA. Baked into the file that
          # gets uploaded so the deployed site and the Supabase row always agree,
          # and version-refresh.js can detect every deploy without manual bumps.
          VERSION="$(date -u +%Y-%m-%d)-${GITHUB_SHA::7}"
          sed -i "s/window.APP_VERSION = '.*';/window.APP_VERSION = '$VERSION';/" js/version.js
          echo "Stamped version: $VERSION"
      - name: Build (concatenate CSS + JS)
        id: build
        run: |
          BUILD_DIR=$(bash build.sh | tail -1)
          echo "build_dir=$BUILD_DIR" >> "$GITHUB_OUTPUT"
      - run: npx surge "${{ steps.build.outputs.build_dir }}" --domain world-cup-sweeps-2026.surge.sh
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
      - name: Wait for CDN propagation
        run: |
          echo "Waiting for site to be reachable..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 https://world-cup-sweeps-2026.surge.sh || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Site is live (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE — waiting..."
            sleep 3
          done
          echo "Site did not return 200 within 90 seconds"
          exit 1
      - name: Update version in Supabase
        env:
          SB_KEY: ${{ secrets.SB_KEY }}
        run: |
          VERSION=$(sed -n "s/.*APP_VERSION = '\(.*\)';.*/\1/p" js/version.js)
          echo "Deployed version: $VERSION"
          # Upsert the single app_version row via PostgREST using the service_role
          # key (bypasses RLS) — the same key/endpoint sync-live.py uses. We verify
          # the row actually came back with the new version, so a failed write fails
          # the step instead of silently passing.
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          PAYLOAD=$(python3 -c "import json,sys; print(json.dumps([{'id':1,'version':sys.argv[1],'updated_at':sys.argv[2]}]))" "$VERSION" "$NOW")
          for i in $(seq 1 3); do
            HTTP=$(curl -s -o /tmp/version_resp.json -w "%{http_code}" \
              -X POST "https://nkztkzrkbeacyltidqwr.supabase.co/rest/v1/app_version?on_conflict=id" \
              -H "apikey: $SB_KEY" \
              -H "Authorization: Bearer $SB_KEY" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates,return=representation" \
              -d "$PAYLOAD" --max-time 15)
            if { [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; } && \
               python3 -c "import json,sys; d=json.load(open('/tmp/version_resp.json')); sys.exit(0 if isinstance(d,list) and any(r.get('version')==sys.argv[1] for r in d) else 1)" "$VERSION"; then
              echo "Supabase version updated to $VERSION"
              exit 0
            fi
            echo "Supabase update attempt $i failed (HTTP $HTTP): $(cat /tmp/version_resp.json)"
            sleep 3
          done
          echo "Failed to update Supabase after 3 attempts"
          exit 1
