name: Deploy to Surge

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npx surge . --domain world-cup-sweeps-2026.surge.sh
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
