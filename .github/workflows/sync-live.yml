name: Live Score Sync

on:
  schedule:
    # Three 6-hour polling windows covering all match kickoff times
    # UTC kickoffs cluster at 16:00–04:00 → three overlapping shifts
    - cron: '0 15 * 6,7 *'    # 15:00 UTC June–July  (covers 16:00–21:00 kickoffs)
    - cron: '0 21 * 6,7 *'    # 21:00 UTC June–July  (covers 21:00–03:00 kickoffs)
    - cron: '0 3 * 6,7 *'     # 03:00 UTC June–July  (covers 03:00–04:00 kickoffs + overrun)
  workflow_dispatch:           # manual trigger from Actions tab

jobs:
  sync-live:
    runs-on: ubuntu-latest
    timeout-minutes: 360       # 6 hours (max allowed)
    steps:
      - uses: actions/checkout@v5

      - name: Write Supabase key
        run: echo "${{ secrets.SB_KEY }}" > /tmp/sb_key

      - name: Run live score poller
        run: python3 scripts/sync-live.py
